buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${rootProject.ext.has('kotlinVersion') ? rootProject.ext.get('kotlinVersion') : '1.6.10'}"
    }
}

def safeExtGet(name, fallback) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

def modernReactNative = rootProject.plugins.hasPlugin("com.facebook.react.rootproject")
def libraryJavaVersion = modernReactNative ? JavaVersion.VERSION_17 : JavaVersion.VERSION_1_8
def libraryKotlinTarget = modernReactNative ? "17" : "1.8"

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
    compileSdkVersion safeExtGet("compileSdkVersion", 35)

    if (project.android.hasProperty("namespace")) {
        namespace "com.reactnativewatermark"
    }

    defaultConfig {
        minSdkVersion safeExtGet("minSdkVersion", 21)
        targetSdkVersion safeExtGet("targetSdkVersion", 35)
    }

    compileOptions {
        sourceCompatibility libraryJavaVersion
        targetCompatibility libraryJavaVersion
    }

    kotlinOptions {
        jvmTarget = libraryKotlinTarget
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-native:+"
}
